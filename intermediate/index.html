<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI應用規劃師（中級）備考學院</title>
<meta name="description" content="AI應用規劃師中級證照｜官方題庫測驗、成績判讀、成長曲線、AI 自動出題與解析" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%235b5bd6'/%3E%3Cstop offset='1' stop-color='%2300b3a4'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='24' fill='url(%23g)'/%3E%3Cpath d='M50 28 L76 42 L50 56 L24 42 Z' fill='white'/%3E%3Cpath d='M33 49 v10 c0 6 8 9 17 9 s17-3 17-9 v-10' fill='none' stroke='white' stroke-width='5' stroke-linecap='round'/%3E%3C/svg%3E" />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#5b5bd6" />
<link rel="apple-touch-icon" href="assets/media/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="備考學院" />
<link rel="stylesheet" href="assets/css/style.css?v=15" />
<script>
  // 低階/行動/減少動態 → 精簡模式（關閉重特效以求流暢）
  window.LITE = (function () { try {
    return matchMedia('(pointer:coarse)').matches
      || matchMedia('(max-width:820px)').matches
      || ((navigator.hardwareConcurrency || 8) <= 4)
      || matchMedia('(prefers-reduced-motion:reduce)').matches;
  } catch (e) { return false; } })();
  document.documentElement.classList.toggle('lite', window.LITE);
</script>
</head>
<body data-theme="light">
<div class="app-bg" aria-hidden="true"></div>
<div class="app-veil" aria-hidden="true"></div>
<canvas class="ink" id="inkCanvas" aria-hidden="true"></canvas>

<!-- 行動版頂列 -->
<header class="topbar">
  <button class="icon-btn" id="menuToggle" aria-label="選單"><i class="ic-wrap" data-ico="menu"></i></button>
  <span class="topbar-title"><i class="ic-wrap" data-ico="cap"></i> AI應用規劃師 · 中級備考學院</span>
  <button class="icon-btn" id="themeToggleTop" aria-label="切換深淺色"><i class="ic-wrap" data-ico="moon"></i></button>
</header>

<div class="layout">
  <!-- 側邊欄 -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-logo"><i class="ic-wrap" data-ico="cap"></i></div>
      <div class="brand-text">
        <div class="brand-title">中級備考學院</div>
        <div class="brand-sub">AI應用規劃師</div>
      </div>
    </div>

    <!-- 認證切換 -->
    <div class="side-section" style="margin-top:2px">
      <div class="cert-switch" style="display:flex;flex-wrap:wrap;gap:6px">
        <a class="chip" href="../junior/" title="切換到 AI應用規劃師（初級）" style="text-decoration:none">初級</a>
        <span class="chip on" title="目前認證">中級</span>
        <span class="chip" title="教材與官方題備齊後開放" style="opacity:.55;cursor:not-allowed">BI 即將推出</span>
      </div>
    </div>

    <!-- 使用者切換 -->
    <div class="user-switcher" id="userSwitcher">
      <button class="user-current" id="userCurrentBtn">
        <span class="user-avatar" id="userAvatar"></span>
        <span class="user-name" id="userNameLabel">學習者</span>
        <span class="chevron">▾</span>
      </button>
      <div class="user-menu hidden" id="userMenu"></div>
    </div>

    <nav class="nav" id="mainNav" aria-label="主導覽">
      <a class="nav-item active" href="#" data-route="dashboard"><i class="ic-wrap" data-ico="dashboard"></i><span>學習儀表板</span></a>
      <a class="nav-item" href="#" data-route="learn"><i class="ic-wrap" data-ico="book"></i><span>教材學習</span></a>
      <a class="nav-item" href="#" data-route="quiz"><i class="ic-wrap" data-ico="pencil"></i><span>開始測驗</span></a>
      <a class="nav-item" href="#" data-route="analysis"><i class="ic-wrap" data-ico="search"></i><span>成績判讀</span></a>
      <a class="nav-item" href="#" data-route="growth"><i class="ic-wrap" data-ico="trending"></i><span>成長曲線</span></a>
      <a class="nav-item" href="#" data-route="generate"><i class="ic-wrap" data-ico="sparkle"></i><span>AI 出題</span></a>
    </nav>

    <!-- AI 模型設定 -->
    <div class="side-section">
      <button class="side-section-head" data-collapse="aiPanel">
        <span class="sh-label"><i class="ic-wrap" data-ico="gear"></i> AI 模型設定</span><span class="chevron">▾</span>
      </button>
      <div class="side-section-body" id="aiPanel">
        <label class="field">
          <span class="field-label">模型供應商</span>
          <select id="aiProvider"></select>
        </label>
        <label class="field">
          <span class="field-label">API 金鑰</span>
          <input type="password" id="aiKey" placeholder="貼上你的 API Key" autocomplete="off" />
        </label>
        <label class="field">
          <span class="field-label">模型名稱</span>
          <input type="text" id="aiModel" placeholder="例：MiniMax-Text-01" />
        </label>
        <label class="field" id="baseUrlField">
          <span class="field-label">API 位址（Base URL）</span>
          <input type="text" id="aiBaseUrl" placeholder="https://..." />
        </label>
        <label class="field" id="pathField">
          <span class="field-label">端點路徑（Path）</span>
          <input type="text" id="aiPath" placeholder="/chat/completions" />
        </label>
        <label class="field">
          <span class="field-label">連線方式</span>
          <select id="aiConnMode">
            <option value="auto">自動（建議）</option>
            <option value="proxy">透過 Netlify 代理（解決 CORS）</option>
            <option value="direct">瀏覽器直接連線</option>
          </select>
        </label>
        <label class="check">
          <input type="checkbox" id="aiRemember" checked />
          <span>在此裝置記住金鑰</span>
        </label>
        <div class="btn-row">
          <button class="btn btn-primary btn-sm" id="aiSaveBtn">儲存</button>
          <button class="btn btn-ghost btn-sm" id="aiTestBtn">測試連線</button>
        </div>
        <div class="ai-status" id="aiStatus"></div>
        <p class="side-hint">金鑰僅儲存在你的瀏覽器，不會上傳到任何伺服器。多裝置請用「資料備份」轉移。</p>
      </div>
    </div>

    <!-- 資料備份 -->
    <div class="side-section">
      <button class="side-section-head" data-collapse="backupPanel">
        <span class="sh-label"><i class="ic-wrap" data-ico="save"></i> 資料備份</span><span class="chevron">▾</span>
      </button>
      <div class="side-section-body collapsed" id="backupPanel">
        <p class="side-hint">成績紀錄存在此瀏覽器。換裝置或清快取前，請先匯出備份。</p>
        <div class="btn-row">
          <button class="btn btn-ghost btn-sm" id="exportBtn">匯出</button>
          <button class="btn btn-ghost btn-sm" id="importBtn">匯入</button>
        </div>
        <button class="btn btn-danger-ghost btn-sm full" id="resetBtn">清除本使用者紀錄</button>
        <input type="file" id="importFile" accept="application/json" hidden />
      </div>
    </div>

    <div class="side-footer">
      <button class="btn btn-ghost btn-sm full" id="themeToggle"><i class="ic-wrap" data-ico="moon"></i> 深／淺色</button>
      <button class="btn btn-ghost btn-sm full" id="inkToggle" hidden aria-pressed="true"><i class="ic-wrap" data-ico="drop"></i> <span id="inkToggleLabel">墨水效果：開</span></button>
      <div class="side-version">v1.0 · 題庫：官方114-2</div>
    </div>
  </aside>

  <div class="sidebar-scrim" id="sidebarScrim"></div>

  <!-- 主內容 -->
  <main class="main" id="mainView"><!-- 由 app.js 動態渲染 --></main>
</div>

<!-- Modal 容器 -->
<div class="modal-root hidden" id="modalRoot">
  <div class="modal-scrim" id="modalScrim"></div>
  <div class="modal-box" id="modalBox"></div>
</div>

<!-- Toast -->
<div class="toast-wrap" id="toastWrap"></div>

<!-- 動畫函式庫（在地化，離線可用） -->
<script defer src="assets/vendor/gsap.min.js?v=15"></script>
<script defer src="assets/vendor/lottie.min.js?v=15"></script>
<!-- 資料（官方題＋教材；擴充題庫 bank.js 由 content-api 按需延遲載入）-->
<script defer src="data/content.js?v=15"></script>
<!-- 模組 -->
<script defer src="assets/js/icons.js?v=15"></script>
<script defer src="assets/js/content-api.js?v=15"></script>
<script defer src="assets/js/store.js?v=15"></script>
<script defer src="assets/js/ai.js?v=15"></script>
<script defer src="assets/js/charts.js?v=15"></script>
<script defer src="assets/js/analysis.js?v=15"></script>
<script defer src="assets/js/quiz.js?v=15"></script>
<script defer src="assets/js/app.js?v=15"></script>
<script defer src="assets/js/anim.js?v=15"></script>
<script defer src="assets/js/interactions.js?v=15"></script>
<script defer src="assets/js/ink.js?v=15"></script>
<script>
  // PWA：註冊 Service Worker（離線可用）。file:// 或不支援時略過。
  if ("serviceWorker" in navigator && location.protocol.indexOf("http") === 0) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("service-worker.js").catch(function () {});
    });
  }
</script>
</body>
</html>
